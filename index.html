    <style>
        :root {
            --bg-color: #FFF9F0;
            --card-bg: #FFFFFF;
            --primary: #E07A5F;
            --primary-hover: #D06347;
            --secondary: #3D405B;
            --accent: #81B29A;
            --text-main: #3D405B;
            --text-light: #6B6E8A;
            --shadow: 0 8px 20px rgba(61, 64, 91, 0.08);
            --shadow-hover: 0 12px 28px rgba(224, 122, 95, 0.2);
            --radius: 20px;
            --img-bg: #F5EFE6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* HEADER & CONTROLS */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .header h1 span {
            color: var(--primary);
        }

        .header p {
            color: var(--text-light);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .controls {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 280px;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid transparent;
            background: var(--card-bg);
            border-radius: 50px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        /* YENİ RANDOM BUTONU STİLİ */
        .btn-random-mix {
            padding: 14px 28px;
            border: none;
            background: var(--primary);
            color: white;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(224, 122, 95, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-random-mix:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-random-mix:active {
            transform: translateY(0);
        }

        /* GALLERY GRID */
        .gallery {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .card-img-wrapper {
            width: 100%;
            height: 320px;
            overflow: hidden;
            background: var(--img-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .card-img-wrapper img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            transition: transform 0.5s ease;
            border-radius: 10px;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .card-title span {
            background: var(--accent);
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-light);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
        }

        .card-tags {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: #FFF0E6;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .tag.designer-tag {
            background: var(--secondary);
            color: white;
            border: 1px dashed var(--primary);
        }

        .download-btn {
            margin-top: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            align-self: flex-start;
        }

        .download-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(224, 122, 95, 0.3);
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(61, 64, 91, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-img-wrapper {
            width: 100%;
            max-height: 500px;
            background: var(--img-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .modal-img {
            max-width: 100%;
            max-height: 460px;
            object-fit: contain;
            border-radius: 10px;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-body h2 {
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 15px;
        }

        .modal-body p {
            color: var(--text-main);
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .modal-tag {
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .modal-tag.designer-modal-tag {
            background: var(--secondary);
            font-weight: 700;
        }

        .modal-download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            z-index: 10;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .gallery { grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
            .card-img-wrapper { height: 220px; padding: 8px; }
            .card-content { padding: 15px; }
            .card-desc { -webkit-line-clamp: 2; font-size: 0.8rem; }
            .download-btn { font-size: 0.75rem; padding: 8px 12px; }
        }
    </style>
</head>

        // Sayfa ilk yüklendiğinde doğrudan random 8'liyi çalıştır
        window.onload = () => {
            generateRandomEight();
        };

        // Arama Fonksiyonu
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (!query) {
                generateRandomEight();
                return;
            }

            // Arama yaparken havuzun tamamında filtreleme yapılması mantıklıdır
            const filtered = jsonData.filter(item => 
                item.icerik_ozeti.toLowerCase().includes(query) ||
                item.etiketler.some(tag => tag.toLowerCase().includes(query)) ||
                item.resim_adi.toLowerCase().includes(query) ||
                (item.tasarlayan && item.tasarlayan.toLowerCase().includes(query))
            );
            
            renderGallery(filtered);
        });

        // TAMAMEN RASTGELE 8 ADET SEÇME FONKSİYONU
        function generateRandomEight() {
            const randomPool = [...jsonData];
            // Fisher-Yates Karıştırma Algoritması
            for (let i = randomPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [randomPool[i], randomPool[j]] = [randomPool[j], randomPool[i]];
            }
            // Karışan havuzun ilk 8 elemanını al ve çizdir
            renderGallery(randomPool.slice(0, 8));
        }

        // Galeriyi HTML'e Dönüştürme
        function renderGallery(data) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (data.length === 0) {
                gallery.innerHTML = `
                    <div class="no-results">
                        <h3>🔍 Aradığınız şeyi bulamadık</h3>
                        <p>Farklı bir kelime veya etiket ile tekrar deneyin.</p>
                    </div>
                `;
                return;
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.04}s`;
                
                const imgPath = `gorseller/${item.resim_adi}`;
                
                // Tasarlayan etiketi vurgulu şekilde en başta yer alıyor
                let designerTagHtml = '';
                if (item.tasarlayan) {
                    designerTagHtml = `<span class="tag designer-tag">🎨 ${item.tasarlayan}</span>`;
                }

                const tagsHtml = item.etiketler.slice(0, 3).map(tag => `<span class="tag">${tag}</span>`).join('');
                const extraTags = item.etiketler.length > 3 ? `<span class="tag">+${item.etiketler.length - 3}</span>` : '';

                card.innerHTML = `
                    <div class="card-img-wrapper" onclick="openModal(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                        <img src="${imgPath}" alt="${item.resim_adi}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x600?text=Görsel+Yüklenemedi'">
                    </div>
                    <div class="card-content">
                        <div class="card-title">
                            ${item.resim_adi.replace('.jpg', '')}
                            <span>${item.etiketler[0] || 'Kültür'}</span>
                        </div>
                        <p class="card-desc">${item.icerik_ozeti}</p>
                        <div class="card-tags">
                            ${designerTagHtml}
                            ${tagsHtml}
                            ${extraTags}
                        </div>
                        <a href="${imgPath}" download="${item.resim_adi}" class="download-btn" onclick="event.stopPropagation();">
                            İndir
                        </a>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // Modal Yapısı
        function openModal(item) {
            const modal = document.getElementById('modal');
            const imgPath = `gorseller/${item.resim_adi}`;
            document.getElementById('modalImg').src = imgPath;
            document.getElementById('modalTitle').textContent = `Görsel: ${item.resim_adi}`;
            document.getElementById('modalDesc').textContent = item.icerik_ozeti;
            
            const tagsContainer = document.getElementById('modalTags');
            let modalTagsHtml = '';
            if (item.tasarlayan) {
                modalTagsHtml += `<span class="modal-tag designer-modal-tag">🎨 Tasarlayan: ${item.tasarlayan}</span>`;
            }
            modalTagsHtml += item.etiketler.map(tag => `<span class="modal-tag">${tag}</span>`).join('');
            tagsContainer.innerHTML = modalTagsHtml;

            const modalDownloadBtn = document.getElementById('modalDownload');
            modalDownloadBtn.href = imgPath;
            modalDownloadBtn.download = item.resim_adi;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
